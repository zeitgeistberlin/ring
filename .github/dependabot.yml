updates:
- directory: /
  groups:
    all-dependencies:
      patterns:
      - "*"
  package-ecosystem: npm
  schedule:
    interval: weekly
- cooldown:
    default-days: 3
  directory: /
  groups:
    all-dependencies:
      patterns:
      - "*"
  ignore:
  - dependency-name: "github/gh-aw-actions/**" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  package-ecosystem: github-actions
  schedule:
    interval: weekly
version: 2

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      all-dependencies:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Wait 3 days after a release before opening routine version-update PRs.
    # Security Updates are unaffected and continue to open immediately.
    cooldown:
      default-days: 3
    groups:
      all-dependencies:
        patterns:
          - '*'
